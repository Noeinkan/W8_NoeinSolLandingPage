# BEGIN NOEINSOL LANDING BLOCK (managed by deploy.sh)
server {
  listen 443 ssl http2 default_server;
  server_name noeinsolutions.com www.noeinsolutions.com;

  ssl_certificate /etc/letsencrypt/live/noeinsolutions.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/noeinsolutions.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  root /var/www/noeinsol;
  index index.html;

  # Keep canonical host while serving a cert valid for both names.
  if ($host = www.noeinsolutions.com) {
    return 301 https://noeinsolutions.com$request_uri;
  }

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_types text/plain text/css application/javascript text/xml application/xml;
  gzip_vary on;
  gzip_min_length 256;

  location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
  }

  location ~* \.html$ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
  }

  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }

  location ~ /\.(?!well-known) {
    deny all;
  }

  error_page 404 /index.html;
}
# END NOEINSOL LANDING BLOCK (managed by deploy.sh)
