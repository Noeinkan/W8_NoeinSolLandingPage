server {
    listen 80;
    listen [::]:80;
    server_name noeinsolutions.com www.noeinsolutions.com;

    # Certbot will replace this block with a redirect after SSL setup
    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/noeinsol;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name noeinsolutions.com www.noeinsolutions.com;

    root /var/www/noeinsol;
    index index.html;

    # SSL — Certbot will populate these paths
    ssl_certificate     /etc/letsencrypt/live/noeinsolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/noeinsolutions.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www to apex
    if ($host = www.noeinsolutions.com) {
        return 301 https://noeinsolutions.com$request_uri;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript text/html text/xml application/xml;
    gzip_vary on;
    gzip_min_length 256;

    # Cache static assets (CSS, JS, images, fonts)
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML pages — no aggressive caching so deploys take effect immediately
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block dotfiles (except .well-known)
    location ~ /\.(?!well-known) {
        deny all;
    }

    error_page 404 /index.html;
}
