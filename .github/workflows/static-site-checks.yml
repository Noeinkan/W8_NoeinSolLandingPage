name: Static Site Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-checks:
    name: Repo Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run UI and UX regression checks
        run: node scripts/tests/ui-ux.test.js

      - name: Run Italian localization parity checks
        run: node scripts/tests/it-translation.test.js

      - name: Run deploy preflight checks
        run: bash deploy.sh --check

  live-smoke:
    name: Live Smoke Checks
    if: github.event_name == 'workflow_dispatch'
    needs: repo-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run landing and app smoke checks
        run: node scripts/smoke-check.js